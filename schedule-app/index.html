<link rel="manifest" href="manifest.json">
<title>VOV pilates & PT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="S_login" class="screen">
  <div class="login-blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="login-wrap">
    <div class="login-logo">
      <!-- <div class="logo-emoji">📋</div> -->
      <h1 class="logo-title">
        <img src="login.png" alt="VOV Pilates">
      </h1>
      <!-- <p class="logo-sub">선생님 수업 관리 시스템</p> -->
    </div>
    <div class="login-card">
      <div class="fg">
        <label class="flabel">이메일</label>
        <input class="finput" id="li_email" type="email" placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="fg">
        <label class="flabel">비밀번호</label>
        <input class="finput" id="li_pw" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="li_err" class="err-msg" style="display:none"></div>
      <button class="btn btn-primary w100" id="li_btn" onclick="doLogin()">로그인</button>
      <div class="reset-wrap">
        <span class="reset-hint">비밀번호를 잊으셨나요?</span>
        <button class="btn btn-ghost sm" id="reset_btn" onclick="doResetPassword()">비밀번호 재설정</button>
      </div>
    </div>
    <p class="login-hint">계정 문의: 관리자에게 연락하세요</p>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="S_app" class="screen" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-left">
      <button class="icon-btn" onclick="openSidebar()">☰</button>
      <span class="tb-title" id="tb_title">스케줄</span>
    </div>
    <div class="tb-right">
      <div class="user-chip">
        <span id="uc_role" class="role-badge"></span>
        <span id="uc_name"></span>
      </div>
      <button class="md" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- SIDEBAR BACKDROP -->
  <div id="sb_backdrop" class="sb-backdrop" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <div class="sb-head">
      <span class="sb-logo">📋 레슨스케줄</span>
      <button class="icon-btn sm" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sb-user" id="sb_user"></div>
    <nav class="sb-nav">
      <button class="snav-btn active" data-page="schedule"  onclick="goPage('schedule')">📅 수업 스케줄</button>
      <button class="snav-btn"        data-page="monthly"   onclick="goPage('monthly')">📆 월별 캘린더</button>
      <button class="snav-btn adm"    data-page="teachers"  onclick="goPage('teachers')">👩‍🏫 선생님 관리</button>
      <button class="snav-btn"        data-page="students"  onclick="goPage('students')">👥 학생 목록</button>
      <button class="snav-btn adm"    data-page="stats"     onclick="goPage('stats')">📊 통계/정산</button>
      <button class="snav-btn adm"    data-page="settings"  onclick="goPage('settings')">⚙️ 설정</button>
    </nav>
    <div class="sb-footer">v<span id="app-version-display"></span></div>
  </div>

  <!-- PAGE CONTAINER -->
  <div class="page-wrap">

    <!-- ── 스케줄 ── -->
    <div class="page" id="P_schedule">
      <div class="week-nav">
        <button class="arrow-btn" onclick="changeWeek(-1)">‹</button>
        <span class="week-lbl" id="wk_label"></span>
        <button class="arrow-btn" onclick="changeWeek(1)">›</button>
      </div>
      <div style="padding:0 16px;margin-bottom:10px;">
        <button class="btn btn-ghost sm w100" onclick="copyLastWeek()" style="border:1px dashed var(--ac);color:var(--ac);">
          🔄 지난주 동일 요일 수업 불러오기
        </button>
      </div>
      <div class="day-tabs" id="day_tabs"></div>
      <div class="t-chips" id="t_chips"></div>
      <div class="day-stats" id="day_stats"></div>
      <div class="lesson-list" id="lesson_list"></div>
      <button class="fab" onclick="openLessonModal()">+</button>
    </div>

    <!-- ── 월별 캘린더 ── -->
    <div class="page" id="P_monthly" style="display:none">
      <div class="week-nav">
        <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
        <span class="week-lbl" id="mo_label"></span>
        <button class="arrow-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div id="cal_grid" class="cal-grid"></div>
      <div id="cal_detail" class="cal-detail"></div>
    </div>

    <!-- ── 선생님 관리 ── -->
    <div class="page" id="P_teachers" style="display:none">
      <div class="ph">
        <h2 class="ph-title">선생님 관리</h2>
        <button class="btn btn-primary sm" onclick="openTeacherModal(null)">+ 추가</button>
      </div>
      <div id="teacher_list" class="card-list"></div>
    </div>

    <!-- ── 학생 목록 ── -->
    <div class="page" id="P_students" style="display:none">
      <div class="ph">
        <h2 class="ph-title">학생 목록</h2>
        <button class="btn btn-primary sm" onclick="openStudentModal(null)">+ 추가</button>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="stu_search" placeholder="🔍  이름 · 전화번호 검색" oninput="renderStudents()">
      </div>
      <div id="student_list" class="card-list"></div>
    </div>

    <!-- ── 통계/정산 ── -->
    <div class="page" id="P_stats" style="display:none">
      <div class="week-nav">
        <button class="arrow-btn" onclick="changeStatsMonth(-1)">‹</button>
        <span class="week-lbl" id="st_label"></span>
        <button class="arrow-btn" onclick="changeStatsMonth(1)">›</button>
      </div>
      <div id="stats_content" class="stats-wrap"></div>
    </div>

    <!-- ── 설정 ── -->
    <div class="page" id="P_settings" style="display:none">
      <div class="ph"><h2 class="ph-title">설정</h2></div>
      <div id="settings_list"></div>
    </div>

  </div><!-- /page-wrap -->
</div><!-- /S_app -->

<!-- ══════════════ MODALS ══════════════ -->

<!-- 수업 모달 -->
<div class="modal-back" id="M_lesson">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-head">
      <h3 id="M_lesson_title" class="m-title">수업 추가</h3>
      <button class="icon-btn sm" onclick="closeModal('M_lesson')">✕</button>
    </div>
    <div class="m-body">
      <div class="frow">
        <div class="fg">
          <label class="flabel">학생 선택</label>
          <select class="fselect" id="lf_stu" onchange="toggleStuInput()"></select>
        </div>
        <div class="fg">
          <label class="flabel">직접 입력</label>
          <input class="finput" id="lf_stuname" placeholder="이름 직접 입력" oninput="toggleStuSelect()">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">담당 선생님</label>
          <select class="fselect" id="lf_teacher"></select>
        </div>
        <div class="fg">
          <label class="flabel">날짜 (자동지정)</label>
          <input class="finput" id="lf_date_display" readonly>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">시작 시간</label>
          <input class="finput" id="lf_time" type="time">
        </div>
        <div class="fg">
          <label class="flabel">수업 길이</label>
          <select class="fselect" id="lf_dur">
            <option value="30">30분</option>
            <option value="50">50분</option>
            <option value="60">60분</option>
            <option value="90">90분</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">메모</label>
        <input class="finput" id="lf_memo" placeholder="특이사항 (선택)">
      </div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal('M_lesson')">취소</button>
        <button class="btn btn-primary" onclick="saveLesson()">저장</button>
      </div>
      <div id="lf_del" style="display:none;margin-top:8px">
        <button class="btn btn-danger w100" onclick="deleteLesson()">🗑 수업 삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 선생님 모달 -->
<div class="modal-back" id="M_teacher">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-head">
      <h3 id="M_teacher_title" class="m-title">선생님 추가</h3>
      <button class="icon-btn sm" onclick="closeModal('M_teacher')">✕</button>
    </div>
    <div class="m-body">
      <div class="frow">
        <div class="fg">
          <label class="flabel">이름 *</label>
          <input class="finput" id="tf_name" placeholder="홍길동">
        </div>
        <div class="fg">
          <label class="flabel">전화번호</label>
          <input class="finput" id="tf_phone" type="tel" 
          placeholder="010-0000-0000" maxlength="13" oninput="autoHyphen(this)">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">이메일 (로그인용) *</label>
          <input class="finput" id="tf_email" type="email" placeholder="teacher@email.com">
        </div>
        <div class="fg">
          <label class="flabel">비밀번호</label>
          <input class="finput" id="tf_pw" type="password" placeholder="6자 이상">
        </div>
      </div>
      <div class="fg">
        <label class="flabel">색상</label>
        <div class="color-row" id="tf_colors"></div>
      </div>
      <div class="fg">
        <label class="flabel">메모</label>
        <input class="finput" id="tf_memo" placeholder="특이사항 (선택)">
      </div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal('M_teacher')">취소</button>
        <button class="btn btn-primary" onclick="saveTeacher()">저장</button>
      </div>
      <div id="tf_del" style="display:none;margin-top:8px">
        <button class="btn btn-danger w100" onclick="deleteTeacher()">🗑 선생님 삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 학생 모달 -->
<div class="modal-back" id="M_student">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-head">
      <h3 id="M_student_title" class="m-title">학생 추가</h3>
      <button class="icon-btn sm" onclick="closeModal('M_student')">✕</button>
    </div>
    <div class="m-body">
      <div class="frow">
        <div class="fg">
          <label class="flabel">이름 *</label>
          <input class="finput" id="sf_name" placeholder="홍길동">
        </div>
        <div class="fg">
          <label class="flabel">학생 전화번호</label>
          <input class="finput" id="sf_phone" type="tel" 
          placeholder="010-0000-0000" maxlength="13" oninput="autoHyphen(this)">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">보호자 이름</label>
          <input class="finput" id="sf_pname" placeholder="(선택)">
        </div>
        <div class="fg">
          <label class="flabel">보호자 연락처</label>
          <input class="finput" id="sf_pphone" type="tel" 
          placeholder="010-0000-0000" maxlength="13" oninput="autoHyphen(this)">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">담당 선생님</label>
          <select class="fselect" id="sf_teacher"></select>
        </div>
        <div class="fg">
          <label class="flabel">월 수강료 (원)</label>
          <input class="finput" id="sf_fee" type="number" placeholder="0">
        </div>
      </div>
      <div class="fg">
        <label class="flabel">메모</label>
        <input class="finput" id="sf_memo" placeholder="특이사항 (선택)">
      </div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal('M_student')">취소</button>
        <button class="btn btn-primary" onclick="saveStudent()">저장</button>
      </div>
      <div id="sf_del" style="display:none;margin-top:8px">
        <button class="btn btn-danger w100" onclick="deleteStudent()">🗑 학생 삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-back" id="M_detail">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div id="M_detail_body" class="m-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
